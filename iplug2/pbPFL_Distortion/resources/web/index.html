<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=700, initial-scale=1.0">
  <title>pbPFL Distortion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="plugin-container">
    <header class="header">
      <div class="brand">
        <img class="brand-logo" src="pbtechlab-logoicon.png" alt="pbTechLab" aria-hidden="true">
        <div class="brand-text"><div class="product-name">pbPFL Distortion</div><div class="maker-name">pbTechLab PrimitiveFxLibrary</div></div>
      </div>
      <div class="header-center">
        <button class="icon-btn" id="undoBtn" type="button" title="Undo">&#8630;</button>
        <button class="icon-btn" id="redoBtn" type="button" title="Redo">&#8631;</button>
        <div class="ab-container"><button class="ab-btn active" type="button" data-slot="A">A</button><button class="ab-btn" type="button" data-slot="B">B</button></div>
        <button class="nav-arrow" id="prevPreset" type="button" title="Previous preset">&#8249;</button>
        <select class="preset-select" aria-label="Preset">
          <option>Distortion Init</option><option>Warm Drive</option><option>Crunch</option><option>Fuzz Box</option><option>Tube Sat</option><option>Hard Clip</option><option>Edge Bite</option><option>Vintage Grit</option><option>Bass Growl</option><option>Wall of Fuzz</option>
        </select>
        <button class="nav-arrow" id="nextPreset" type="button" title="Next preset">&#8250;</button>
        <button class="icon-btn icon-only" id="savePresetBtn" type="button" title="Save Preset" aria-label="Save"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg></button>
      </div>
      <div class="header-right">
        <button class="icon-btn icon-only" id="helpBtn" type="button" title="Help" aria-label="Help"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 5.8 1c-.6 1.2-1.9 1.7-2.5 2.7"/><path d="M12 17h.01"/></svg></button>
        <button class="icon-btn icon-only btn-bypass" type="button" title="Bypass" aria-label="Bypass"><svg viewBox="0 0 24 24"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg></button>
      </div>
    </header>
    <main class="main"><section class="knob-row" aria-label="Parameters"></section></main>
    <footer class="footer">
      <div class="footer-right">
        <span class="footer-item">v1.0.0</span>
      </div>
    </footer>
  </div>
  <script>
    // Canonical parameter table. Order MUST match the EParams enum in PbPFLDistortion.h
    // (drive, bias, tone, lowCut, shape, dryWet, output, bypass). The host
    // (JUCE or iPlug2) is authoritative for min/max/value at runtime; this table
    // supplies id / unit / step / display order and acts as a standalone fallback.
    const PLUGIN_PARAMS = [
      {"id":"drive","name":"Drive","min":0,"max":36,"value":12,"defaultValue":12,"step":0.1,"unit":"dB"},
      {"id":"bias","name":"Bias","min":-1,"max":1,"value":0,"defaultValue":0,"step":0.01,"unit":""},
      {"id":"tone","name":"Tone","min":0,"max":100,"value":55,"defaultValue":55,"step":1,"unit":"%"},
      {"id":"lowCut","name":"Low Cut","min":20,"max":1000,"value":80,"defaultValue":80,"step":1,"unit":"Hz"},
      {"id":"shape","name":"Shape","min":0,"max":100,"value":45,"defaultValue":45,"step":1,"unit":"%"},
      {"id":"dryWet","name":"Dry/Wet","min":0,"max":100,"value":70,"defaultValue":70,"step":1,"unit":"%"},
      {"id":"output","name":"Output","min":-36,"max":12,"value":-6,"defaultValue":-6,"step":0.1,"unit":"dB"}
    ];
    // Bypass is param index 7 in the host but is not rendered as a knob.
    const BYPASS_PARAM_INDEX = 7;
  </script>
  <script src="knob-render.js"></script>
  <script src="script.js"></script>
</body>
</html>
